<!-- Badge Component -->
{% raw %}<!-- Usage: {% include 'components/badge.html' with text='Active' type='success' size='sm' %} -->{% endraw %}

<span class="badge inline-flex items-center gap-1.5 font-medium transition-all duration-300
    {% if type == 'success' %}bg-green-400/10 text-green-400 border-green-400/30
    {% elif type == 'error' %}bg-red-400/10 text-red-400 border-red-400/30
    {% elif type == 'warning' %}bg-yellow-400/10 text-yellow-400 border-yellow-400/30
    {% elif type == 'info' %}bg-cyan-400/10 text-cyan-400 border-cyan-400/30
    {% elif type == 'purple' %}bg-purple-400/10 text-purple-400 border-purple-400/30
    {% elif type == 'neutral' %}bg-gray-400/10 text-gray-400 border-gray-400/30
    {% else %}bg-gray-400/10 text-gray-400 border-gray-400/30{% endif %}
    border
    {% if size == 'xs' %}px-1.5 py-0.5 text-[10px] rounded-md
    {% elif size == 'sm' %}px-2 py-0.5 text-xs rounded-lg
    {% elif size == 'md' %}px-3 py-1 text-sm rounded-xl
    {% elif size == 'lg' %}px-4 py-1.5 text-base rounded-xl
    {% else %}px-2 py-0.5 text-xs rounded-lg{% endif %}
    {% if dot %}pl-1.5{% endif %}
    {% if animated %}animate-pulse{% endif %}
    {% if class %}{{ class }}{% endif %}"
    {% if tooltip %}title="{{ tooltip }}"{% endif %}
    {% if id %}id="{{ id }}"{% endif %}>
    
    {% if dot %}
    <span class="w-2 h-2 rounded-full 
        {% if type == 'success' %}bg-green-400
        {% elif type == 'error' %}bg-red-400
        {% elif type == 'warning' %}bg-yellow-400
        {% elif type == 'info' %}bg-cyan-400
        {% elif type == 'purple' %}bg-purple-400
        {% else %}bg-gray-400{% endif %}
        {% if animated %}animate-ping{% endif %}">
    </span>
    {% endif %}
    
    {% if icon %}
    <i class="fas fa-{{ icon }} text-[10px]"></i>
    {% endif %}
    
    <span>{{ text }}</span>
    
    {% if removable %}
    <button onclick="this.parentElement.remove()" 
            class="ml-1 hover:opacity-70 transition-opacity"
            title="Remove">
        <i class="fas fa-times text-[10px]"></i>
    </button>
    {% endif %}
    
    {% if count %}
    <span class="ml-1 px-1.5 py-0.5 rounded-full bg-white/10 text-[10px]">{{ count }}</span>
    {% endif %}
</span>
