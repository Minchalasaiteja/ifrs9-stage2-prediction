<!-- Modal Component -->
<div id="modal-overlay" class="fixed inset-0 z-[1000] bg-black/70 backdrop-blur-sm hidden flex items-center justify-center p-4"
     onclick="if(event.target === this) closeModal()">
    
    <div id="modal-container" class="glass-card w-full max-w-lg max-h-[90vh] overflow-y-auto transform scale-95 opacity-0 transition-all duration-300">
        
        <!-- Modal Header -->
        <div class="flex items-center justify-between p-6 border-b border-white/5">
            <h3 id="modal-title" class="text-xl font-bold font-['Space_Grotesk']">Modal Title</h3>
            <button onclick="closeModal()" class="text-gray-500 hover:text-white transition-colors text-xl leading-none">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <!-- Modal Body -->
        <div id="modal-body" class="p-6">
            <!-- Content goes here -->
        </div>
        
        <!-- Modal Footer -->
        <div id="modal-footer" class="flex items-center justify-end gap-3 p-6 border-t border-white/5">
            <button onclick="closeModal()" class="glass-card px-6 py-2.5 rounded-xl text-gray-400 hover:text-white transition-colors">
                Cancel
            </button>
            <button id="modal-confirm-btn" class="gradient-btn px-6 py-2.5 rounded-xl" onclick="confirmModal()">
                Confirm
            </button>
        </div>
    </div>
</div>
