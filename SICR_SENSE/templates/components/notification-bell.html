<!-- Notification Bell Component -->
<div class="relative">
    <button onclick="toggleNotifications()" 
            class="glass-card p-2.5 rounded-xl hover:border-cyan-400 transition-all relative">
        <i class="fas fa-bell text-gray-400 hover:text-cyan-400 transition-colors"></i>
        <span id="notification-badge" 
              class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-[10px] rounded-full flex items-center justify-center font-bold hidden">
            0
        </span>
    </button>
    
    <!-- Notifications Dropdown -->
    <div id="notifications-dropdown" 
         class="absolute right-0 mt-2 w-80 glass-card p-2 hidden max-h-96 overflow-y-auto z-50">
        
        <!-- Header -->
        <div class="flex items-center justify-between p-3 border-b border-white/5">
            <h4 class="font-semibold text-sm">Notifications</h4>
            <div class="flex items-center gap-2">
                <button onclick="markAllRead()" class="text-xs text-cyan-400 hover:text-cyan-300">
                    Mark all read
                </button>
                <span class="w-1 h-1 bg-gray-600 rounded-full"></span>
                <button onclick="toggleNotifications()" class="text-gray-500 hover:text-white">
                    <i class="fas fa-times text-sm"></i>
                </button>
            </div>
        </div>
        
        <!-- Notification List -->
        <div id="notification-list" class="py-2">
            <!-- Loading -->
            <div id="notifications-loading" class="p-8 text-center">
                <div class="w-8 h-8 border-2 border-cyan-400/20 border-t-cyan-400 rounded-full animate-spin mx-auto mb-3"></div>
                <p class="text-sm text-gray-500">Loading notifications...</p>
            </div>
            
            <!-- Empty State -->
            <div id="notifications-empty" class="p-8 text-center hidden">
                <i class="fas fa-bell-slash text-3xl text-gray-600 mb-3 block"></i>
                <p class="text-sm text-gray-500">No notifications</p>
            </div>
            
            <!-- Notifications rendered here -->
            <div id="notifications-content"></div>
        </div>
        
        <!-- Footer -->
        <div class="p-3 border-t border-white/5">
            <a href="/notifications" class="block text-center text-xs text-cyan-400 hover:text-cyan-300">
                View All Notifications
            </a>
        </div>
    </div>
</div>
