<!-- Theme Toggle Component -->
<button id="theme-toggle" 
        class="glass-card p-2.5 rounded-xl hover:border-cyan-400 transition-all group"
        onclick="toggleTheme()"
        aria-label="Toggle theme"
        title="Toggle dark/light mode">
    <i id="theme-icon" class="fas fa-moon text-gray-400 group-hover:text-cyan-400 transition-colors text-lg"></i>
</button>
