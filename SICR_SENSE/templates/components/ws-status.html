<!-- WebSocket Status Component -->
<div id="ws-status" class="flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium bg-red-400/10 text-red-400 border border-red-400/30">
    <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 bg-red-400"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-red-400"></span>
    </span>
    <span id="ws-status-text">Disconnected</span>
    <span class="text-gray-500">•</span>
    <span id="ws-latency" class="text-gray-400">0ms</span>
</div>
