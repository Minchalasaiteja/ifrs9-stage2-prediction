{% extends 'dashboard_base.html' %}
{% block title %}SICRSense | IFRS 9 Visual Workflow{% endblock %}

{% block extra_css %}
<style>
/* Custom Cursor */
    .custom-cursor {
      width: 40px;
      height: 40px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s ease, border-color 0.3s ease;
      mix-blend-mode: difference;
    }
    
    .cursor-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.05s ease;
    }
    
    /* 3D Canvas Background */
    #bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    
    /* Section Styles */
    .section {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px;
    }
    
    /* Glass Cards */
    
    
    /* IFRS 9 Stage Cards */
    .stage-card {
      position: relative;
      padding: 40px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(19, 19, 32, 0.8), rgba(10, 10, 15, 0.9));
      border: 2px solid transparent;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    
    .stage-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 24px;
      padding: 2px;
      background: linear-gradient(135deg, transparent, var(--accent), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    
    .stage-card:hover::before {
      opacity: 1;
    }
    
    .stage-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 60px rgba(0, 240, 255, 0.2);
    }
    
    .stage-1 { border-color: rgba(16, 185, 129, 0.3); }
    .stage-2 { border-color: rgba(245, 158, 11, 0.3); }
    .stage-3 { border-color: rgba(239, 68, 68, 0.3); }
    
    /* Flow Line */
    .flow-line {
      position: absolute;
      pointer-events: none;
    }
    
    /* Animated Particles */
    .particle-stream {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      animation: particleFlow 3s linear infinite;
      opacity: 0;
    }
    
    @keyframes particleFlow {
      0% { transform: translate(0, 0) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }
    
    /* Typography */
    .gradient-text {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Data Flow Visualization */
    .data-node {
      position: relative;
      padding: 20px;
      border-radius: 16px;
      background: rgba(19, 19, 32, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .data-node:hover {
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
    }
    
    .data-node.active {
      border-color: var(--accent);
      background: rgba(0, 240, 255, 0.1);
    }
    
    /* Connector Lines */
    .connector {
      position: absolute;
      pointer-events: none;
    }
    
    .connector-line {
      stroke: rgba(0, 240, 255, 0.3);
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawLine 2s ease-out forwards;
    }
    
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
    
    /* Probability Gauge */
    .gauge-ring {
      transform: rotate(-90deg);
    }
    
    .gauge-progress {
      transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Floating Elements */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    
    .floating {
      animation: float 6s ease-in-out infinite;
    }
    
    /* Matrix Rain Effect */
    #matrix-rain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.05;
      pointer-events: none;
    }
    
    /* Stage Transition Animation */
    @keyframes stageTransition {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .stage-animate {
      animation: stageTransition 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    
    /* Pulse Ring */
    .pulse-ring {
      position: absolute;
      border: 2px solid var(--accent);
      border-radius: 50%;
      animation: pulseRing 2s ease-out infinite;
    }
    
    @keyframes pulseRing {
      0% { width: 0; height: 0; opacity: 1; }
      100% { width: 100px; height: 100px; opacity: 0; }
    }
</style>
{% endblock %}

{% block content %}

{% endblock %}

{% block scripts %}
<script>
    // ===== CUSTOM CURSOR =====
    const cursor = document.getElementById('customCursor');
    const cursorDot = document.getElementById('cursorDot');
    
    document.addEventListener('mousemove', (e) => {
      gsap.to(cursor, {
        x: e.clientX - 20,
        y: e.clientY - 20,
        duration: 0.5,
        ease: 'power2.out'
      });
      
      gsap.to(cursorDot, {
        x: e.clientX - 4,
        y: e.clientY - 4,
        duration: 0.1
      });
    });
    
    // Cursor effects on hover
    document.querySelectorAll('a, button, .data-node, .stage-card').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.transform = 'scale(1.5)';
        cursor.style.borderColor = '#7c3aed';
      });
      
      el.addEventListener('mouseleave', () => {
        cursor.style.transform = 'scale(1)';
        cursor.style.borderColor = '#00f0ff';
      });
    });

    function setWorkflowTheme(theme) {
      const root = document.documentElement;
      const html = document.documentElement;
      const body = document.body;
      if (theme === 'dark') {
        root.style.setProperty('--bg-primary', '#0a0a0f');
        root.style.setProperty('--bg-secondary', '#131320');
        root.style.setProperty('--text-primary', '#ffffff');
        root.style.setProperty('--text-secondary', '#a0a0b0');
        body.style.background = '#0a0a0f';
        body.style.color = '#ffffff';
      } else {
        root.style.setProperty('--bg-primary', '#f8fafc');
        root.style.setProperty('--bg-secondary', '#e2e8f0');
        root.style.setProperty('--text-primary', '#0f172a');
        root.style.setProperty('--text-secondary', '#475569');
        body.style.background = '#f8fafc';
        body.style.color = '#0f172a';
      }
      html.dataset.workflowTheme = theme;
      localStorage.setItem('ifrs9-workflow-theme', theme);
    }

    function toggleTheme() {
      const current = document.documentElement.dataset.workflowTheme || 'dark';
      const nextTheme = current === 'dark' ? 'light' : 'dark';
      setWorkflowTheme(nextTheme);
      updateThemeIcon(nextTheme);
    }

    function initWorkflowTheme() {
      const saved = localStorage.getItem('ifrs9-workflow-theme');
      const initialTheme = saved === 'light' ? 'light' : 'dark';
      setWorkflowTheme(initialTheme);
      updateThemeIcon(initialTheme);
    }

    function updateThemeIcon(theme) {
      const icon = document.querySelector('nav button i');
      if (!icon) return;
      icon.classList.toggle('fa-moon', theme === 'dark');
      icon.classList.toggle('fa-sun', theme === 'light');
    }

    document.addEventListener('DOMContentLoaded', initWorkflowTheme);
    
    // ===== 3D BACKGROUND =====n    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ 
      canvas: document.getElementById('bg-canvas'),
      alpha: true,
      antialias: true 
    });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    // Create geometric shapes
    const geometries = [
      new THREE.IcosahedronGeometry(1, 0),
      new THREE.OctahedronGeometry(0.8),
      new THREE.TetrahedronGeometry(0.7),
      new THREE.DodecahedronGeometry(0.6)
    ];
    
    const shapes = [];
    geometries.forEach((geometry, index) => {
      const material = new THREE.MeshBasicMaterial({
        color: index < 2 ? 0x00f0ff : 0x7c3aed,
        wireframe: true,
        transparent: true,
        opacity: 0.2
      });
      
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.set(
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 6,
        (Math.random() - 0.5) * 4 - 2
      );
      shapes.push(mesh);
      scene.add(mesh);
    });
    
    // Add particles
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 2000;
    const posArray = new Float32Array(particlesCount * 3);
    
    for(let i = 0; i < particlesCount * 3; i += 3) {
      posArray[i] = (Math.random() - 0.5) * 15;
      posArray[i+1] = (Math.random() - 0.5) * 10;
      posArray[i+2] = (Math.random() - 0.5) * 8 - 3;
    }
    
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const particlesMaterial = new THREE.PointsMaterial({
      size: 0.02,
      color: 0x00f0ff,
      blending: THREE.AdditiveBlending
    });
    
    const particles = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particles);
    
    camera.position.z = 5;
    
    function animate3D() {
      requestAnimationFrame(animate3D);
      
      shapes.forEach((shape, index) => {
        shape.rotation.x += 0.001 + index * 0.0005;
        shape.rotation.y += 0.002 + index * 0.0005;
        shape.position.y += Math.sin(Date.now() * 0.001 + index) * 0.003;
      });
      
      particles.rotation.y += 0.0003;
      particles.rotation.x += 0.0001;
      
      renderer.render(scene, camera);
    }
    
    animate3D();
    
    // ===== MATRIX RAIN EFFECT =====
    const matrixCanvas = document.getElementById('matrix-rain');
    const matrixCtx = matrixCanvas.getContext('2d');
    
    matrixCanvas.width = window.innerWidth;
    matrixCanvas.height = window.innerHeight;
    
    const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$€£¥%#@&';
    const fontSize = 14;
    const columns = matrixCanvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    
    function drawMatrix() {
      matrixCtx.fillStyle = 'rgba(10, 10, 15, 0.05)';
      matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
      
      matrixCtx.fillStyle = '#0F0';
      matrixCtx.font = `${fontSize}px monospace`;
      
      for (let i = 0; i < drops.length; i++) {
        const text = characters[Math.floor(Math.random() * characters.length)];
        matrixCtx.fillText(text, i * fontSize, drops[i] * fontSize);
        
        if (drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }
    
    setInterval(drawMatrix, 50);
    
    // ===== D3.js MIGRATION FLOW =====
    function createMigrationFlow() {
      const container = document.getElementById('migration-flow');
      const width = container.offsetWidth;
      const height = container.offsetHeight;
      
      const svg = d3.select('#migration-flow')
        .append('svg')
        .attr('width', width)
        .attr('height', height);
      
      // Define arrow marker
      svg.append('defs').append('marker')
        .attr('id', 'arrow')
        .attr('viewBox', '0 -5 10 10')
        .attr('refX', 30)
        .attr('refY', 0)
        .attr('markerWidth', 8)
        .attr('markerHeight', 8)
        .attr('orient', 'auto')
        .append('path')
        .attr('d', 'M0,-5L10,0L0,5')
        .attr('fill', '#00f0ff');
      
      // Nodes
      const nodes = [
        { id: 'stage1', label: 'Stage 1\nPerforming', x: width * 0.15, y: height * 0.3, color: '#10b981' },
        { id: 'stage2', label: 'Stage 2\nSICR', x: width * 0.5, y: height * 0.3, color: '#f59e0b' },
        { id: 'stage3', label: 'Stage 3\nImpaired', x: width * 0.85, y: height * 0.3, color: '#ef4444' },
        { id: 'cured', label: 'Cured\n(Return to Stage 1)', x: width * 0.5, y: height * 0.7, color: '#10b981' },
        { id: 'default', label: 'Default', x: width * 0.85, y: height * 0.7, color: '#ef4444' }
      ];
      
      // Links
      const links = [
        { source: 'stage1', target: 'stage2', value: 15, label: '15%' },
        { source: 'stage1', target: 'stage3', value: 2, label: '2%' },
        { source: 'stage2', target: 'stage1', value: 30, label: '30% Cured' },
        { source: 'stage2', target: 'stage3', value: 20, label: '20%' },
        { source: 'stage3', target: 'default', value: 60, label: '60%' },
        { source: 'stage2', target: 'cured', value: 10, label: '10%' }
      ];
      
      // Draw links with animation
      const linkElements = svg.selectAll('.link')
        .data(links)
        .enter()
        .append('g');
      
      linkElements.append('path')
        .attr('class', 'connector-line')
        .attr('d', d => {
          const source = nodes.find(n => n.id === d.source);
          const target = nodes.find(n => n.id === d.target);
          return `M${source.x},${source.y} Q${(source.x + target.x) / 2},${Math.min(source.y, target.y) - 50} ${target.x},${target.y}`;
        })
        .attr('stroke', d => {
          const source = nodes.find(n => n.id === d.source);
          return source.color;
        })
        .attr('stroke-width', d => d.value / 5)
        .attr('fill', 'none')
        .attr('opacity', 0.6)
        .attr('stroke-dasharray', function() {
          return this.getTotalLength();
        })
        .attr('stroke-dashoffset', function() {
          return this.getTotalLength();
        })
        .transition()
        .duration(2000)
        .delay((d, i) => i * 300)
        .attr('stroke-dashoffset', 0);
      
      // Add flow labels
      linkElements.append('text')
        .attr('x', d => {
          const source = nodes.find(n => n.id === d.source);
          const target = nodes.find(n => n.id === d.target);
          return (source.x + target.x) / 2;
        })
        .attr('y', d => {
          const source = nodes.find(n => n.id === d.source);
          const target = nodes.find(n => n.id === d.target);
          return Math.min(source.y, target.y) - 30;
        })
        .attr('text-anchor', 'middle')
        .attr('fill', '#a0a0b0')
        .attr('font-size', '12')
        .text(d => d.label);
      
      // Draw nodes
      const nodeElements = svg.selectAll('.node')
        .data(nodes)
        .enter()
        .append('g')
        .attr('transform', d => `translate(${d.x}, ${d.y})`);
      
      nodeElements.append('circle')
        .attr('r', 40)
        .attr('fill', d => `${d.color}20`)
        .attr('stroke', d => d.color)
        .attr('stroke-width', 2)
        .attr('opacity', 0)
        .transition()
        .duration(1000)
        .delay((d, i) => i * 200)
        .attr('opacity', 1);
      
      nodeElements.append('text')
        .attr('text-anchor', 'middle')
        .attr('dy', '0.35em')
        .attr('fill', '#ffffff')
        .attr('font-size', '12')
        .attr('font-weight', 'bold')
        .text(d => d.label)
        .attr('opacity', 0)
        .transition()
        .duration(1000)
        .delay((d, i) => i * 200 + 200)
        .attr('opacity', 1);
      
      // Animated particles along paths
      function animateParticles() {
        links.forEach(link => {
          const source = nodes.find(n => n.id === link.source);
          const target = nodes.find(n => n.id === link.target);
          
          const particle = svg.append('circle')
            .attr('r', 4)
            .attr('fill', source.color)
            .attr('opacity', 0);
          
          function moveParticle() {
            particle.attr('opacity', 1)
              .attr('cx', source.x)
              .attr('cy', source.y)
              .transition()
              .duration(2000)
              .attrTween('transform', () => {
                return (t) => {
                  const x = source.x + (target.x - source.x) * t;
                  const y = source.y + (target.y - source.y) * t - Math.sin(t * Math.PI) * 50;
                  return `translate(${x}, ${y})`;
                };
              })
              .on('end', () => {
                particle.attr('opacity', 0);
                setTimeout(moveParticle, Math.random() * 1000);
              });
          }
          
          moveParticle();
        });
      }
      
      setTimeout(animateParticles, 2500);
    }
    
    // ===== WORKFLOW CONNECTIONS =====
    function drawWorkflowConnections() {
      const svg = document.getElementById('workflow-connections');
      const steps = document.querySelectorAll('.data-node');
      
      if (steps.length < 2) return;
      
      const svgNS = 'http://www.w3.org/2000/svg';
      
      for (let i = 0; i < steps.length - 1; i++) {
        const current = steps[i].getBoundingClientRect();
        const next = steps[i + 1].getBoundingClientRect();
        
        const x1 = current.right;
        const y1 = current.top + current.height / 2;
        const x2 = next.left;
        const y2 = next.top + next.height / 2;
        
        const path = document.createElementNS(svgNS, 'path');
        path.setAttribute('d', `M${x1},${y1} C${(x1 + x2) / 2},${y1} ${(x1 + x2) / 2},${y2} ${x2},${y2}`);
        path.setAttribute('stroke', 'rgba(0, 240, 255, 0.3)');
        path.setAttribute('stroke-width', '2');
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke-dasharray', '1000');
        path.setAttribute('stroke-dashoffset', '1000');
        
        svg.appendChild(path);
        
        // Animate
        setTimeout(() => {
          path.style.transition = 'stroke-dashoffset 2s ease-out';
          path.setAttribute('stroke-dashoffset', '0');
        }, i * 500);
      }
    }
    
    // ===== INTERACTIVE DEMO =====
    function setupInteractiveDemo() {
      const creditScore = document.getElementById('creditScore');
      const pdChange = document.getElementById('pdChange');
      const daysPastDue = document.getElementById('daysPastDue');
      
      function updateStage() {
        const score = parseInt(creditScore.value);
        const pd = parseInt(pdChange.value);
        const dpd = parseInt(daysPastDue.value);
        
        document.getElementById('scoreValue').textContent = score;
        document.getElementById('pdValue').textContent = pd + '%';
        document.getElementById('dpdValue').textContent = dpd;
        
        let stage = 1;
        let description = 'Performing asset with low credit risk';
        let color = '#10b981';
        
        if (score < 500 || pd > 100 || dpd > 30) {
          stage = 3;
          description = 'Credit-impaired asset requiring immediate attention';
          color = '#ef4444';
        } else if (score < 650 || pd > 50 || dpd > 15) {
          stage = 2;
          description = 'Significant increase in credit risk detected';
          color = '#f59e0b';
        }
        
        const resultDiv = document.getElementById('stageResult');
        document.getElementById('predictedStage').textContent = `Stage ${stage}`;
        document.getElementById('predictedStage').style.color = color;
        document.getElementById('stageDescription').textContent = description;
        
        // Animate result
        gsap.from(resultDiv, {
          scale: 0.9,
          duration: 0.5,
          ease: 'back.out(1.7)'
        });
        
        // Update border color
        resultDiv.style.borderColor = color;
      }
      
      creditScore.addEventListener('input', updateStage);
      pdChange.addEventListener('input', updateStage);
      daysPastDue.addEventListener('input', updateStage);
    }
    
    // ===== SCROLL ANIMATIONS =====
    gsap.registerPlugin(ScrollTrigger);
    
    document.querySelectorAll('.stage-card').forEach((card, index) => {
      gsap.from(card, {
        scrollTrigger: {
          trigger: card,
          start: 'top 80%',
          toggleActions: 'play none none reverse'
        },
        y: 100,
        opacity: 0,
        duration: 1,
        delay: index * 0.2,
        ease: 'power3.out'
      });
    });
    
    // ===== D3.js METRICS VISUALIZATION =====
    function createMetricsVisualization() {
      const container = document.getElementById('metrics-visualization');
      const width = container.offsetWidth;
      const height = container.offsetHeight;
      
      const svg = d3.select('#metrics-visualization')
        .append('svg')
        .attr('width', width)
        .attr('height', height);
      
      // Create animated bars for SICR indicators
      const indicators = [
        { label: 'PD Relative Change', value: 85, threshold: 100, color: '#f59e0b' },
        { label: 'Credit Score Drop', value: 45, threshold: 50, color: '#ef4444' },
        { label: 'DPD Days', value: 15, threshold: 30, color: '#f59e0b' },
        { label: 'Score < 600', value: 520, threshold: 600, color: '#10b981' },
        { label: 'Inquiries (6m)', value: 4, threshold: 5, color: '#10b981' }
      ];
      
      const barHeight = 60;
      const barSpacing = 30;
      const maxBarWidth = width * 0.6;
      
      indicators.forEach((indicator, index) => {
        const y = index * (barHeight + barSpacing) + 50;
        const barWidth = (indicator.value / indicator.threshold) * maxBarWidth;
        const isOverThreshold = indicator.value >= indicator.threshold;
        
        // Background bar
        svg.append('rect')
          .attr('x', 200)
          .attr('y', y)
          .attr('width', maxBarWidth)
          .attr('height', barHeight)
          .attr('fill', 'rgba(255, 255, 255, 0.05)')
          .attr('rx', 8);
        
        // Threshold line
        svg.append('line')
          .attr('x1', 200 + maxBarWidth)
          .attr('y1', y - 10)
          .attr('x2', 200 + maxBarWidth)
          .attr('y2', y + barHeight + 10)
          .attr('stroke', '#ef4444')
          .attr('stroke-width', 2)
          .attr('stroke-dasharray', '5,5');
        
        // Value bar
        const bar = svg.append('rect')
          .attr('x', 200)
          .attr('y', y)
          .attr('width', 0)
          .attr('height', barHeight)
          .attr('fill', indicator.color)
          .attr('rx', 8)
          .attr('opacity', 0.8);
        
        // Animate bar
        bar.transition()
          .duration(1500)
          .delay(index * 300)
          .attr('width', barWidth);
        
        // Label
        svg.append('text')
          .attr('x', 190)
          .attr('y', y + barHeight / 2)
          .attr('text-anchor', 'end')
          .attr('alignment-baseline', 'middle')
          .attr('fill', '#a0a0b0')
          .attr('font-size', '14')
          .text(indicator.label);
        
        // Value text
        const valueText = svg.append('text')
          .attr('x', 210 + barWidth)
          .attr('y', y + barHeight / 2)
          .attr('alignment-baseline', 'middle')
          .attr('fill', '#ffffff')
          .attr('font-size', '14')
          .attr('font-weight', 'bold')
          .attr('opacity', 0);
        
        valueText.transition()
          .duration(1000)
          .delay(index * 300 + 1000)
          .attr('opacity', 1);
        
        // Animated counter
        const counter = { value: 0 };
        gsap.to(counter, {
          value: indicator.value,
          duration: 1.5,
          delay: index * 0.3,
          ease: 'power2.out',
          onUpdate: () => {
            valueText.text(Math.round(counter.value));
          }
        });
      });
    }
    
    // ===== INITIALIZATION =====
    document.addEventListener('DOMContentLoaded', () => {
      createMigrationFlow();
      drawWorkflowConnections();
      setupInteractiveDemo();
      createMetricsVisualization();
      
      // Particle animations for workflow steps
      for (let i = 1; i <= 4; i++) {
        createParticleStream(`particles-${i}`);
      }
    });
    
    function createParticleStream(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      
      setInterval(() => {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.setProperty('--tx', (Math.random() - 0.5) * 100 + 'px');
        particle.style.setProperty('--ty', (Math.random() - 0.5) * 100 + 'px');
        particle.style.animationDuration = (Math.random() * 2 + 1) + 's';
        
        container.appendChild(particle);
        
        setTimeout(() => {
          particle.remove();
        }, 3000);
      }, 200);
    }
    
    function scrollToStages() {
      document.getElementById('stages').scrollIntoView({ behavior: 'smooth' });
    }
    
    // ===== RESIZE HANDLING =====
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      matrixCanvas.width = window.innerWidth;
      matrixCanvas.height = window.innerHeight;
    });
  </script>
{% endblock %}
