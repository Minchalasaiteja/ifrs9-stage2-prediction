<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ title|default('SICRSense') }}{% endblock %}</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #131320;
      --bg-tertiary: #1a1a2e;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --accent: #00f0ff;
      --accent2: #7c3aed;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --glass-bg: rgba(19, 19, 32, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
    }
    
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .glass-card:hover {
      border-color: rgba(0, 240, 255, 0.3);
      box-shadow: 0 8px 32px rgba(0, 240, 255, 0.15);
    }
    
    .neo-element {
      background: linear-gradient(145deg, #1a1a2e, #0d0d1a);
      box-shadow: 8px 8px 16px #0a0a14, -8px -8px 16px #1e1e32;
      border-radius: 16px;
    }
    
    .neo-input {
      background: linear-gradient(145deg, #1a1a2e, #0d0d1a);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-primary);
      transition: all 0.3s ease;
      outline: none;
      width: 100%;
    }
    
    .neo-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
    }
    
    .gradient-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .gradient-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 240, 255, 0.3);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    @keyframes live-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
    }
    
    .live-indicator {
      width: 10px;
      height: 10px;
      background: var(--success);
      border-radius: 50%;
      animation: live-pulse 2s ease-in-out infinite;
      display: inline-block;
    }
    
    .progress-ring {
      transition: stroke-dashoffset 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: linear-gradient(var(--accent), var(--accent2)); border-radius: 3px; }
    
    .sidebar {
      background: var(--bg-secondary);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .nav-item {
      padding: 12px 20px;
      margin: 4px 12px;
      border-radius: 12px;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-secondary);
      text-decoration: none;
    }
    
    .nav-item:hover {
      background: rgba(0, 240, 255, 0.1);
      color: var(--accent);
    }
    
    .nav-item.active {
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(124, 58, 237, 0.2));
      color: var(--accent);
    }
    
    {% block extra_css %}{% endblock %}
  </style>
</head>
<body class="antialiased">
  
  <div class="flex h-screen">
    
    <!-- Sidebar -->
    {% include 'components/sidebar.html' %}
    
    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto">
      
      <!-- Top Bar -->
      {% include 'components/header.html' %}
      
      <div class="p-8 space-y-8">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  
  <!-- Global Modal & Toast -->
  {% include 'components/modal.html' %}
  {% include 'components/toast.html' %}
  
  <!-- Global JS Components -->
  <script src="/static/js/components.js"></script>
  <script src="/static/js/theme-manager.js"></script>
  
  <script>
    // Initialize theme manager on all dashboard pages
    const themeManager = new ThemeManager({
      storageKey: 'sicrsense-theme',
      toggleSelector: '#themeToggle',
      iconSelector: '#themeIcon'
    });
  </script>
  
  {% block scripts %}{% endblock %}
</body>
</html>
