# config/main_config.yaml
# Execution flags and overall orchestration settings.

pipeline_flags:
  run_preprocessing: true
  run_feature_engineering: true
  train_models: true
  generate_reports: true

inference_settings:
  # The probability threshold above which a loan is flagged for Stage 2
  classification_threshold: 0.50
  champion_model: "xgboost" # Options: xgboost, lightgbm

logging:
  level: "INFO"
  file: "logs/ifrs9_pipeline.log"